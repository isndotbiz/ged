name: Deploy Web
on:
  push:
    branches: [main]
    paths:
      - 'gedfix-app/src/**'
      - 'packages/core/src/**'
      - 'gedfix-app/static/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: VITE_WEB=true pnpm -C gedfix-app build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: gedfix
          directory: gedfix-app/build
