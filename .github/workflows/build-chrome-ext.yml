name: Build Chrome Extension
on:
  push:
    branches: [main]
    paths:
      - 'gedfix-app/apps/chrome-ext/**'
      - 'packages/core/src/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install deps
        run: npm install
        working-directory: gedfix-app/apps/chrome-ext
      - name: Build extension
        run: npm run build
        working-directory: gedfix-app/apps/chrome-ext
      - name: Zip extension
        run: cd dist && zip -r ../gedfix-chrome-ext.zip .
        working-directory: gedfix-app/apps/chrome-ext
      - uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: gedfix-app/apps/chrome-ext/gedfix-chrome-ext.zip
