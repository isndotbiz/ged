<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GedFix Popup</title>
    <style>
      body { width: 300px; height: 400px; margin: 0; background: #0d1117; color: #f0f4f8; font: 13px/1.4 system-ui, sans-serif; }
      main { padding: 10px; }
      input, button { width: 100%; box-sizing: border-box; margin-bottom: 8px; border-radius: 6px; border: 1px solid rgba(95,223,223,.25); background: #111827; color: #f0f4f8; padding: 8px; }
      button { background: #1e9ff2; border: 0; cursor: pointer; }
      .card { background: #111827; border: 1px solid rgba(95,223,223,.2); border-radius: 8px; padding: 8px; margin-bottom: 8px; }
      .muted { color: #8a96a3; font-size: 12px; }
    </style>
  </head>
  <body>
    <main>
      <div class="card" id="stats">Loading stats…</div>
      <input id="search" placeholder="Search in side panel" />
      <button id="open-side">Open Side Panel Search</button>
      <div class="card" id="recent">No recent people.</div>
      <button id="open-full">Open Full App</button>
      <button id="import-gedcom">Import GEDCOM</button>
      <input id="file" type="file" accept=".ged" style="display:none" />
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
