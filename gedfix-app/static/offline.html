<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GedFix Offline</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(160deg, #f6f0e8 0%, #e9ddcf 100%);
        font-family: Georgia, 'Times New Roman', serif;
        color: #2b1f16;
      }
      .card {
        max-width: 34rem;
        margin: 1rem;
        padding: 2rem;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.75);
        border: 1px solid rgba(43, 31, 22, 0.14);
        box-shadow: 0 14px 36px rgba(43, 31, 22, 0.15);
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.6rem;
      }
      p {
        margin: 0;
        font-family: 'Courier New', monospace;
        color: #5b4f43;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>GedFix is offline — your data is still accessible</h1>
      <p>Reconnect to sync cloud services and fetch live data.</p>
    </div>
  </body>
</html>
