<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="https://b2cdn.isn.biz/file/isnbiz-cdn/assets/gedfix/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="https://b2cdn.isn.biz/file/isnbiz-cdn/assets/gedfix/icon-16.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta name="description" content="Clean, visualize, and research your family tree with AI-powered tools" />

    <meta property="og:image" content="https://b2cdn.isn.biz/file/isnbiz-cdn/assets/gedfix/hero.webp" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
    <script>
      if (typeof window !== 'undefined' && 'serviceWorker' in navigator && !('__TAURI_INTERNALS__' in window)) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
