# GEDfix Configuration File
# All values here can be customized. CLI arguments override these settings.

# Default output paths
paths:
  output_dir: "out"
  backup_dir: "out/backup"
  check_report: "out/check_report.md"
  scan_report: "out/report.json"
  output_ged: "out/gedfix_fixed.ged"
  dedupe_output: "out/deduplicated.ged"
  dry_run_temp: "out/_dry_run.ged"
  dedupe_dry_run_temp: "out/_dedupe_dry_run.ged"
  issues_file: "manual_review_issues.json"

# Numerical thresholds
thresholds:
  # Deduplication
  default_dedup_threshold: 95.0
  auto_merge_threshold: 100.0
  name_duplicate_threshold: 85
  validation_duplicate_threshold: 85.0

  # Birth year similarity scoring
  exact_birth_year_bonus: 20
  close_birth_year_bonus: 10
  large_year_diff_penalty: -20
  close_year_range: 2
  large_year_range: 10

  # Surname/place consistency checker
  surname_min_occurrences: 2
  surname_similarity_standard: 90
  surname_similarity_aggressive: 92
  surname_similarity_ultra: 88
  place_similarity_standard: 90
  place_similarity_aggressive: 92
  place_similarity_ultra: 88

# Note prefixes and message templates
notes:
  note_prefix: "AutoFix:"
  dedup_message: "Duplicates removed using comprehensive automation"
  merge_message: "Merged duplicate individual {secondary_id}. Combined data from both records."
  date_standardized: "Date standardized from '{original}' to GEDCOM format."
  date_unrecognized: "Unrecognized or non-GEDCOM date preserved."
  name_standardized: "Name formatting standardized."
  name_normalized: "Name formatting standardized and normalized."
  place_standardized: "Place name formatting standardized."
  place_normalized: "Place name standardized and normalized."
  duplicate_removed: "Removed duplicate event block"
  suffix_moved: "Moved suffix '{suffix}' to NSFX"
  duplicate_marr_removed: "Removed duplicate MARR block"

# GEDCOM-specific settings
gedcom:
  # Standard GEDCOM month abbreviations
  months:
    - JAN
    - FEB
    - MAR
    - APR
    - MAY
    - JUN
    - JUL
    - AUG
    - SEP
    - OCT
    - NOV
    - DEC

  # Month name to abbreviation mappings
  month_names:
    JANUARY: JAN
    FEBRUARY: FEB
    MARCH: MAR
    APRIL: APR
    MAY: MAY
    JUNE: JUN
    JULY: JUL
    AUGUST: AUG
    SEPTEMBER: SEP
    OCTOBER: OCT
    NOVEMBER: NOV
    DECEMBER: DEC
    SEPT: SEP
    "JAN.": JAN
    "FEB.": FEB
    "MAR.": MAR
    "APR.": APR
    "JUN.": JUN
    "JUL.": JUL
    "AUG.": AUG
    "SEP.": SEP
    "SEPT.": SEP
    "OCT.": OCT
    "NOV.": NOV
    "DEC.": DEC

  # Date qualifiers
  qualifiers:
    - ABT
    - EST
    - CAL
    - INT
    - BEF
    - AFT
    - BET
    - FROM
    - TO
    - AND

  # Circa term mappings
  circa_terms:
    CIRCA: ABT
    ABOUT: ABT
    "C.": ABT
    "CA.": ABT
    APPROX: ABT

  # Event tags to check for duplicates
  event_tags:
    - BIRT
    - DEAT
    - CHR
    - BAPM

  # Marriage tag
  marriage_tag: MARR

  # Spouse tags
  spouse_tags:
    - HUSB
    - WIFE

  # Family member tags
  family_member_tags:
    - HUSB
    - WIFE
    - CHIL

  # Header template for new GEDCOM files
  header_lines:
    - "0 HEAD"
    - "1 SOUR gedfix"
    - "1 CHAR UTF-8"

  # Trailer line
  trailer: "0 TRLR"

  # Timestamp format for backups
  timestamp_format: "%Y%m%d-%H%M%S"

