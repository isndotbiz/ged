# Processing levels
levels:
  standard:
    merge_duplicates: false
    fuzzy_threshold: 96
    fix_dates: true
    fix_names: true
    fix_places: false
    structural_validation: false
    advanced_name_resolution: false
    historical_place_mapping: false
    date_consistency_checks: false

  aggressive:
    merge_duplicates: true
    fuzzy_threshold: 92
    fix_dates: true
    fix_names: true
    fix_places: true
    structural_validation: true
    advanced_name_resolution: false
    historical_place_mapping: false
    date_consistency_checks: false

  ultra:
    merge_duplicates: true
    fuzzy_threshold: 88
    fix_dates: true
    fix_names: true
    fix_places: true
    structural_validation: true
    advanced_name_resolution: false
    historical_place_mapping: false
    date_consistency_checks: false

  comprehensive:
    merge_duplicates: true
    fuzzy_threshold: 90
    fix_dates: true
    fix_names: true
    fix_places: true
    structural_validation: true
    advanced_name_resolution: true
